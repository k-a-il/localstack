name: LocalStack - Feature catalog files

on:
  workflow_dispatch:
  pull_request_target:
    paths:
      - localstack-core/localstack/services/**
    types: [labeled, unlabeled, opened, edited, synchronize]
    # only enforce for PRs targeting the master branch
    branches:
    - master

jobs:
  check_file_update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get List of changed service files
        id: changed-files
        run: |
          ALL_CHANGED_FILES=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" | jq -r '.[].filename' | paste -sd, -)
          echo "all_changed_files=$ALL_CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install pyyaml jsonschema

      - name: Check YAML file schema
        env:
          ALL_CHANGED_FILES: "${{ steps.changed-files.outputs.all_changed_files }}"
          FEATURES_JSON_SCHEMA: "features_schema.json"
        run: python3 .github/scripts/validate_yaml.py


